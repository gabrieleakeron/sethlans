name: Board images

# Pushing a tag like `board-v1.2.0` builds the two Sethlans Board Docker images
# (backend + frontend) and pushes them to Docker Hub under the `gabrieleconsonni`
# account, tagged with both `:latest` and the semantic version from the tag.
#
# Kept separate from `release.yml` (which builds the `sethlans` CLI tarball on
# `v*` tags): the board images and the CLI are released on independent cycles.
#
# Required GitHub secrets:
#   DOCKERHUB_USERNAME — the Docker Hub account (e.g. gabrieleconsonni)
#   DOCKERHUB_TOKEN    — a Docker Hub access token with Read & Write scope

on:
  push:
    tags:
      - 'board-v*'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: sethlans-server
            context: packages/sethlans-board/backend
          - image: sethlans-board
            context: packages/sethlans-board/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute version from tag (strip "board-v")
        id: ver
        run: echo "version=${GITHUB_REF_NAME#board-v}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            gabrieleconsonni/${{ matrix.image }}:latest
            gabrieleconsonni/${{ matrix.image }}:${{ steps.ver.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
